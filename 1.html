<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoTube Ultra 2026 PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f0f0f;color:#fff;transition:.3s}

/* SIDEBAR */
.sidebar{
position:fixed;left:0;top:0;width:240px;height:100vh;
background:#151515;padding:20px;border-right:1px solid #2a2a2a
}
.logo{font-size:28px;font-weight:800;color:#ff2a2a;margin-bottom:20px}
.sidebar a{
display:block;color:#ddd;text-decoration:none;
padding:12px;border-radius:10px;margin:6px 0
}
.sidebar a:hover{background:#2a2a2a}

/* MAIN */
.main{margin-left:240px}

/* TOPBAR */
.topbar{
position:sticky;top:0;z-index:99;
display:flex;justify-content:space-between;align-items:center;
padding:12px 20px;background:#ff1a1a
}
.search{
width:360px;padding:10px;border-radius:20px;border:none;outline:none
}
.toggle{
background:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer
}

/* HERO */
.hero{
height:380px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=1600') center/cover;
display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center
}
.hero h1{font-size:58px}
.hero p{margin-top:10px;color:#ccc}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;padding:25px
}
.card{
background:#1a1a1a;border-radius:15px;padding:15px;
transition:.3s
}
.card:hover{transform:translateY(-6px)}
.thumb{
height:160px;border-radius:12px;
background:linear-gradient(135deg,#ff0000,#3a0000);
display:flex;align-items:center;justify-content:center;
font-size:50px
}
.btn{
display:inline-block;margin-top:10px;
background:#ff1a1a;color:#fff;padding:10px 14px;
border-radius:10px;text-decoration:none;border:none;cursor:pointer
}

/* BOT */
.bot{
position:fixed;right:20px;bottom:20px;
width:280px;background:#1b1b1b;
border-radius:15px;padding:10px
}
.bot input{
width:100%;padding:8px;border-radius:10px;border:none;margin-top:8px
}
.reply{margin-top:8px;font-size:13px;color:#9dff9d}

/* MODAL */
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.85);
justify-content:center;align-items:center
}
.modal iframe{
width:80%;height:70%;border-radius:12px
}

.light{background:#f4f4f4;color:#111}
.light .sidebar,.light .card,.light .bot{background:#fff;color:#111}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">▶ NoTube PRO</div>
<a href="#">🏠 Home</a>
<a href="#">🔥 Trending</a>
<a href="#">⚽ Sport</a>
<a href="#">🎵 Muzikë</a>
<a href="#">😂 Humor</a>
</div>

<div class="main">

<div class="topbar">
<input class="search" id="search" placeholder="Kërko video, kategori...">
<button class="toggle" onclick="document.body.classList.toggle('light')">🌙/☀️</button>
</div>

<div class="hero">
<h1>NoTube Ultra PRO MAX</h1>
<p>Kërko, shiko dhe menaxho videot si platformë reale</p>
</div>

<!-- VIDEOS -->
<div class="grid" id="grid"></div>

</div>

<!-- BOT -->
<div class="bot">
<b>🤖 NoTube AI Bot</b>
<div id="reply">Shkruaj: video 1, sport, muzikë...</div>
<input id="msg" placeholder="komandë...">
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeVideo()">
<iframe id="frame" allowfullscreen></iframe>
</div>

<script>

/* DATABASE (5 VIDEOT) */
const videos = [
{title:"Football Skills 2026",cat:"sport",id:"B6-Z5ul2ccQ"},
{title:"Best Music Mix 2026",cat:"muzike",id:"K63aAiAsWoo"},
{title:"Funny Moments",cat:"humor",id:"hgJTabvbFVE"},
{title:"Top Goals HD",cat:"sport",id:"wrqmKMOsYvc"},
{title:"Relaxing Music",cat:"muzike",id:"Mv9GpyUolzM"}
];

/* RENDER */
function render(list){
let grid=document.getElementById("grid");
grid.innerHTML="";

list.forEach(v=>{
grid.innerHTML+=`
<div class="card">
<div class="thumb">▶</div>
<h3>${v.title}</h3>
<p style="color:#aaa">${v.cat}</p>
<button class="btn" onclick="openVideo('${v.id}')">Shiko</button>
</div>`;
});
}
render(videos);

/* SEARCH (SUPER PRO) */
document.getElementById("search").addEventListener("input",e=>{
let q=e.target.value.toLowerCase();

let filtered=videos.filter(v=>
v.title.toLowerCase().includes(q) ||
v.cat.toLowerCase().includes(q)
);

render(filtered);
});

/* VIDEO PLAYER */
function openVideo(id){
document.getElementById("modal").style.display="flex";
document.getElementById("frame").src=
`https://www.youtube.com/embed/${id}`;
}
function closeVideo(){
document.getElementById("modal").style.display="none";
document.getElementById("frame").src="";
}

/* BOT INTELIGJENT */
document.getElementById("msg").addEventListener("input",e=>{
let t=e.target.value.toLowerCase();
let r="Nuk e kuptova 🤖";

if(t.includes("sport")) r="Po shfaq sportet";
else if(t.includes("muzik")) r="Po shfaq muzikë";
else if(t.includes("humor")) r="Po shfaq humor 😂";
else if(t.includes("video")) r="Provo: video 1, video 2...";

document.getElementById("reply").innerText="Bot: "+r;
});

</script>

</body>
</html>
